<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="refresh" content="0; url=https://geodrona.cz">

<title>Web v přípravě – přesměrování</title>

<script>
window.location.replace("https://geodrona.cz");
</script>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.container {
    max-width: 600px;
    padding: 20px;
}

h1 {
    font-size: 3rem;
    margin-bottom: 10px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
}

p {
    font-size: 1.4rem;
    margin: 20px 0;
    opacity: 0.9;
}

.logo {
    font-size: 6rem;
    margin-bottom: 20px;
}

.link a {
    color: #ffd700;
    text-decoration: none;
    font-weight: bold;
}

.link a:hover {
    text-decoration: underline;
}

@media (max-width: 600px) {
    h1 { font-size: 2.2rem; }
    p { font-size: 1.2rem; }
    .logo { font-size: 4rem; }
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">📍</div>

    <h1>Web v přípravě</h1>
    <p>Přesměrování na nový web…</p>

    <div class="link">
        <a href="https://geodrona.cz">Pokračovat na geodrona.cz</a>
    </div>
</div>

</body>
</html>
