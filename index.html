<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>geodrona.cz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>setTimeout(() => window.location.replace("https://geodrona.cz"), 3500);</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #03060a;
    --accent: #39ff14;
    --text: #cddfc4;
    --muted: #3a5232;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .topo {
    position: fixed; inset: 0; pointer-events: none;
  }
  .topo svg { width: 100%; height: 100%; }

  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 75% 75% at 50% 50%, transparent 35%, rgba(3,6,10,0.9) 100%);
    pointer-events: none;
  }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(57,255,20,0.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none;
    animation: breathe 5s ease-in-out infinite alternate;
  }
  @keyframes breathe {
    from { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
    to   { opacity: 1;   transform: translate(-50%,-50%) scale(1.15); }
  }

  .scanline {
    position: fixed; width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(57,255,20,0.1), transparent);
    animation: scan 7s linear infinite;
    pointer-events: none; z-index: 3;
  }
  @keyframes scan { from { top: -2px; } to { top: 100vh; } }

  .corner {
    position: fixed;
    font-size: 0.58rem;
    color: rgba(57,255,20,0.15);
    letter-spacing: 0.09em;
    line-height: 1.8; z-index: 5;
  }
  .c-tl { top: 20px; left: 22px; }
  .c-br { bottom: 20px; right: 22px; text-align: right; }

  .container {
    position: relative; z-index: 10;
    text-align: center; padding: 40px 32px;
  }

  .icon {
    width: 62px; height: 62px;
    margin: 0 auto 26px;
    animation: floaty 3s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(57,255,20,0.55));
  }
  @keyframes floaty {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-9px); }
  }

  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid rgba(57,255,20,0.2);
    background: rgba(57,255,20,0.04);
    border-radius: 3px;
    padding: 4px 14px;
    font-size: 0.6rem; letter-spacing: 0.2em; color: var(--accent);
    margin-bottom: 18px;
    animation: fadeUp 0.6s ease both;
  }
  .chip-dot {
    width: 5px; height: 5px; background: var(--accent);
    border-radius: 50%; box-shadow: 0 0 5px var(--accent);
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.1; } }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 10vw, 7.5rem);
    letter-spacing: 0.07em;
    line-height: 0.9;
    margin-bottom: 10px;
    animation: fadeUp 0.6s ease 0.1s both;
  }
  .g1 { color: #fff; }
  .g2 { color: var(--accent); text-shadow: 0 0 28px rgba(57,255,20,0.4); }
  .g3 { color: var(--muted); font-size: 0.42em; letter-spacing: 0.1em; vertical-align: middle; }

  .sub {
    font-size: 0.68rem; color: var(--muted);
    letter-spacing: 0.16em; text-transform: uppercase;
    margin-bottom: 42px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .prog-wrap {
    width: 280px; margin: 0 auto 26px;
    animation: fadeUp 0.6s ease 0.3s both;
  }
  .prog-meta {
    display: flex; justify-content: space-between;
    font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 7px;
  }
  .prog-track { height: 3px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
  .prog-fill {
    height: 3px; background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 18px rgba(57,255,20,0.25);
    width: 0;
    animation: fill 3s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes fill { from { width: 0; } to { width: 100%; } }

  .link {
    display: inline-flex; align-items: center; gap: 10px;
    text-decoration: none; color: var(--text);
    font-size: 0.72rem; letter-spacing: 0.06em;
    padding: 10px 22px;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 3px;
    transition: all 0.2s;
    animation: fadeUp 0.6s ease 0.4s both;
  }
  .link:hover {
    border-color: rgba(57,255,20,0.28);
    color: var(--accent); background: rgba(57,255,20,0.04);
    transform: translateY(-2px);
  }
  .arr { transition: transform 0.2s; }
  .link:hover .arr { transform: translateX(4px); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
